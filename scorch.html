<!-- ============================================================ -->
<!--  SCORCH COMMENT SECTION + DM POPUP                            -->
<!--  Paste this block INSIDE Scorch's dating page, right before   -->
<!--  the closing  </div>  of  <div class="dating-wrap">           -->
<!--  (i.e. after the last .dating-card, before the wrap closes).  -->
<!-- ============================================================ -->

<div class="dating-card scorch-comments" id="scorchComments">
  <h2 class="dating-card-head">Leave him a comment — if you dare</h2>
  <p class="sc-comments-sub">he reads every one. he replies to most. <em>sometimes he slides into your DMs.</em></p>

  <div class="sc-comment-form">
    <input type="text" class="sc-name-input" id="scName" maxlength="24" placeholder="your name (or stay anonymous)" autocomplete="off">
    <textarea class="sc-comment-input" id="scComment" maxlength="280" placeholder="say something to Scorch..."></textarea>
    <button type="button" class="sc-comment-send" id="scSend">Post Comment</button>
    <div class="sc-comment-status" id="scStatus" role="status" aria-live="polite"></div>
  </div>

  <div class="sc-comment-thread" id="scThread"></div>
</div>


<!-- ===== DM POPUP (lives near end of body, before scripts) ===== -->
<div class="sc-dm-popup" id="scDmPopup" aria-hidden="true">
  <div class="sc-dm-card">
    <button class="sc-dm-close" id="scDmClose" type="button" aria-label="Close">✕</button>
    <div class="sc-dm-header">
      <div class="sc-dm-avatar">
        <img src="assets/Scorch Pics/SexyScorchLookingDown.webp" alt="Scorch" onerror="this.style.display='none'">
      </div>
      <div class="sc-dm-who">
        <div class="sc-dm-name">Scorch <span class="sc-dm-verified">✓</span></div>
        <div class="sc-dm-status">slid into your DMs</div>
      </div>
    </div>
    <div class="sc-dm-body" id="scDmBody"></div>
    <div class="sc-dm-footer">you can't reply — he'd just leave you on read anyway</div>
  </div>
</div>


<style>
/* ============= SCORCH COMMENTS + DM — matches dating-page fire theme ============= */
.scorch-comments { --sc-accent: var(--dp-accent, #ff5a1f); --sc-accent-2: var(--dp-accent-2, #c8281a); }
.sc-comments-sub {
  font-family: 'Outfit', sans-serif; font-size: 0.92rem;
  color: var(--dp-ink-dim, rgba(255,255,255,0.6)); margin: 0 0 1.1rem; line-height: 1.5;
}
.sc-comments-sub em { color: var(--sc-accent); font-style: italic; }

.sc-comment-form { display: flex; flex-direction: column; gap: 0.7rem; }
.sc-name-input, .sc-comment-input {
  width: 100%; box-sizing: border-box;
  background: rgba(0,0,0,0.28); border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 0.8rem 1rem; color: #fff;
  font-family: 'Outfit', sans-serif; font-size: 0.98rem; transition: border-color .18s ease, box-shadow .18s ease;
}
.sc-comment-input { resize: vertical; min-height: 90px; line-height: 1.5; }
.sc-name-input:focus, .sc-comment-input:focus {
  outline: none; border-color: var(--sc-accent);
  box-shadow: 0 0 0 3px rgba(255,90,31,0.18);
}
.sc-name-input::placeholder, .sc-comment-input::placeholder { color: rgba(255,255,255,0.4); }

.sc-comment-send {
  align-self: flex-start; cursor: pointer; border: none;
  font-family: 'Oswald', sans-serif; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  font-size: 0.92rem; color: #fff; padding: 0.7rem 1.5rem; border-radius: 999px;
  background: linear-gradient(135deg, var(--sc-accent), var(--sc-accent-2));
  box-shadow: 0 6px 20px rgba(255,90,31,0.35); transition: transform .15s ease, box-shadow .15s ease, opacity .15s;
}
.sc-comment-send:hover { transform: translateY(-2px); box-shadow: 0 9px 26px rgba(255,90,31,0.5); }
.sc-comment-send:disabled { opacity: 0.5; cursor: default; transform: none; }

.sc-comment-status { font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--sc-accent); min-height: 1.2em; }

.sc-comment-thread { margin-top: 1.4rem; display: flex; flex-direction: column; gap: 1rem; }

/* a single comment (user post + scorch reply) */
.sc-comment {
  background: rgba(255,255,255,0.045); border-radius: 14px; padding: 0.9rem 1.05rem;
  border: 1px solid rgba(255,255,255,0.07);
}
.sc-comment-author { font-family: 'Oswald', sans-serif; font-weight: 600; color: #fff; font-size: 0.95rem; margin-bottom: 0.2rem; }
.sc-comment-text { font-family: 'Outfit', sans-serif; color: rgba(255,255,255,0.88); font-size: 0.96rem; line-height: 1.45; }

.sc-reply {
  margin-top: 0.8rem; margin-left: 0.8rem; padding: 0.75rem 1rem;
  background: linear-gradient(135deg, rgba(255,90,31,0.12), rgba(200,40,26,0.06));
  border-left: 3px solid var(--sc-accent); border-radius: 0 12px 12px 0;
}
.sc-reply-author {
  font-family: 'Oswald', sans-serif; font-weight: 700; color: var(--sc-accent);
  font-size: 0.9rem; display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.25rem;
}
.sc-reply-author .sc-mini-verified { color: var(--sc-accent); font-size: 0.78rem; }
.sc-reply-text { font-family: 'Outfit', sans-serif; color: rgba(255,255,255,0.92); font-size: 0.95rem; line-height: 1.45; }
.sc-typing { font-style: italic; color: rgba(255,255,255,0.5); }

/* ===== DM POPUP ===== */
.sc-dm-popup {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: rgba(5,2,15,0.72); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none; transition: opacity .3s ease;
  padding: 1.2rem;
}
.sc-dm-popup.open { opacity: 1; pointer-events: auto; }
.sc-dm-card {
  position: relative; width: min(440px, 100%);
  background: linear-gradient(160deg, #1a0a1f, #14060c);
  border-radius: 22px; padding: 1.5rem;
  box-shadow: 0 24px 70px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,90,31,0.25);
  transform: translateY(24px) scale(0.96); transition: transform .35s cubic-bezier(.2,.9,.3,1.3);
}
.sc-dm-popup.open .sc-dm-card { transform: translateY(0) scale(1); }
.sc-dm-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 22px 22px 0 0;
  background: linear-gradient(90deg, transparent, var(--dp-accent, #ff5a1f), transparent);
}
.sc-dm-close {
  position: absolute; top: 0.9rem; right: 1rem; background: none; border: none;
  color: rgba(255,255,255,0.5); font-size: 1.2rem; cursor: pointer; transition: color .15s;
}
.sc-dm-close:hover { color: #fff; }
.sc-dm-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
.sc-dm-avatar { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
  border: 2px solid var(--dp-accent, #ff5a1f); box-shadow: 0 0 14px rgba(255,90,31,0.5); background: #000; }
.sc-dm-avatar img { width: 100%; height: 100%; object-fit: cover; }
.sc-dm-name { font-family: 'Oswald', sans-serif; font-weight: 700; color: #fff; font-size: 1.05rem; display: flex; align-items: center; gap: 0.35rem; }
.sc-dm-verified { color: var(--dp-accent, #ff5a1f); font-size: 0.8rem; }
.sc-dm-status { font-family: 'Outfit', sans-serif; font-size: 0.8rem; color: var(--dp-accent, #ff5a1f); opacity: 0.85; }
.sc-dm-body {
  font-family: 'Outfit', sans-serif; color: #fff; font-size: 1rem; line-height: 1.55;
  background: rgba(255,90,31,0.1); border-radius: 14px; padding: 0.95rem 1.1rem; min-height: 2em;
}
.sc-dm-footer { font-family: 'Outfit', sans-serif; font-size: 0.78rem; color: rgba(255,255,255,0.4); text-align: center; margin-top: 0.9rem; font-style: italic; }
</style>


<script>
/* ============= SCORCH COMMENTS + DM LOGIC ============= */
(function () {
  // 🔧 PASTE YOUR VERCEL URL HERE (the .vercel.app address, no trailing slash):
  const FUNCTION_URL = "https://YOUR-PROJECT.vercel.app/api/comment";

  const sendBtn = document.getElementById("scSend");
  const nameEl  = document.getElementById("scName");
  const textEl  = document.getElementById("scComment");
  const statusEl= document.getElementById("scStatus");
  const thread  = document.getElementById("scThread");

  const dmPopup = document.getElementById("scDmPopup");
  const dmBody  = document.getElementById("scDmBody");
  const dmClose = document.getElementById("scDmClose");

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function openDM(text) {
    dmBody.textContent = text;
    dmPopup.classList.add("open");
    dmPopup.setAttribute("aria-hidden", "false");
  }
  function closeDM() {
    dmPopup.classList.remove("open");
    dmPopup.setAttribute("aria-hidden", "true");
  }
  dmClose.addEventListener("click", closeDM);
  dmPopup.addEventListener("click", e => { if (e.target === dmPopup) closeDM(); });

  sendBtn.addEventListener("click", async () => {
    const comment = textEl.value.trim();
    const name = nameEl.value.trim() || "Anonymous";
    if (!comment) { statusEl.textContent = "type something first."; return; }

    // render the user's comment immediately
    const block = document.createElement("div");
    block.className = "sc-comment";
    block.innerHTML =
      `<div class="sc-comment-author">${escapeHtml(name)}</div>
       <div class="sc-comment-text">${escapeHtml(comment)}</div>
       <div class="sc-reply">
         <div class="sc-reply-author">Scorch <span class="sc-mini-verified">✓</span></div>
         <div class="sc-reply-text sc-typing">typing...</div>
       </div>`;
    thread.prepend(block);
    const replyEl = block.querySelector(".sc-reply-text");

    textEl.value = "";
    sendBtn.disabled = true;
    statusEl.textContent = "sending...";

    try {
      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ character: "scorch", comment }),
      });
      const data = await res.json();

      replyEl.classList.remove("sc-typing");
      replyEl.textContent = data.reply || "…(he ignored you)";
      statusEl.textContent = "";

      // if the function sent a DM, pop it after a beat
      if (data.dm) {
        setTimeout(() => openDM(data.dm), 1200);
      }
    } catch (err) {
      replyEl.classList.remove("sc-typing");
      replyEl.textContent = "(couldn't reach him — try again)";
      statusEl.textContent = "connection failed.";
    } finally {
      sendBtn.disabled = false;
    }
  });
})();
</script>
<!-- ===================== END SCORCH COMMENTS + DM ===================== -->
